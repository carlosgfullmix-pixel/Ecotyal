<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Laboratorio IA Evolutivo</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #020617, #000);
  color: #e2e8f0;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

button {
  padding: 12px;
  margin-top: 10px;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #22c55e, #38bdf8);
  font-weight: bold;
  cursor: pointer;
}

.box {
  margin-top: 15px;
  padding: 15px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 IA Evolutiva Experimental</h1>

<button onclick="start()">Iniciar Investigación</button>

<canvas id="chart"></canvas>

<div id="log"></div>

</div>

<script>

// =======================
// CONFIG
// =======================

let poblacion = [];
let history = [];
let running = false;

// =======================
// MODELO ZETA (simple)
// =======================

function zeta(s, t) {
  let sum = 0;
  for (let n = 1; n < 300; n++) {
    sum += Math.cos(t * Math.log(n)) / Math.pow(n, s);
  }
  return Math.abs(sum);
}

// =======================
// GENERAR POBLACIÓN
// =======================

function initPoblacion() {
  poblacion = [];
  for (let i = 0; i < 20; i++) {
    poblacion.push(0.5 + (Math.random()-0.5)*0.5);
  }
}

// =======================
// FITNESS
// =======================

function fitness(h) {
  let error = 0;
  for (let t = 10; t < 30; t += 2) {
    error += zeta(h, t);
  }
  return error;
}

// =======================
// EVOLUCIÓN
// =======================

function mutar(h) {
  return h + (Math.random()-0.5)*0.05;
}

function cruzar(a, b) {
  return (a + b)/2;
}

function evolucionar() {

  let evaluados = poblacion.map(h => ({
    h,
    f: fitness(h)
  }));

  evaluados.sort((a,b)=>a.f - b.f);

  let mejores = evaluados.slice(0, 5);

  let nueva = [];

  // conservar mejores
  mejores.forEach(m => nueva.push(m.h));

  // cruzar y mutar
  while (nueva.length < 20) {
    let a = mejores[Math.floor(Math.random()*mejores.length)].h;
    let b = mejores[Math.floor(Math.random()*mejores.length)].h;

    let hijo = cruzar(a,b);
    hijo = mutar(hijo);

    nueva.push(hijo);
  }

  poblacion = nueva;

  return mejores[0];
}

// =======================
// GRÁFICO
// =======================

let chart;

function initChart() {
  const ctx = document.getElementById('chart');

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Mejor Fitness',
        data: []
      }]
    }
  });
}

// =======================
// LOOP PRINCIPAL
// =======================

function start() {

  if (!chart) initChart();

  initPoblacion();
  running = true;

  let iter = 0;

  let loop = setInterval(() => {

    if (!running) return;

    let mejor = evolucionar();

    history.push(mejor.f);

    chart.data.labels.push(iter);
    chart.data.datasets[0].data.push(mejor.f);
    chart.update();

    document.getElementById("log").innerHTML =
      `<div class="box">
        Iteración: ${iter}<br>
        Mejor hipótesis: ${mejor.h.toFixed(4)}<br>
        Error: ${mejor.f.toFixed(4)}
      </div>`;

    // guardar memoria
    localStorage.setItem("best", JSON.stringify(mejor));

    iter++;

    if (iter > 50) clearInterval(loop);

  }, 500);
}

</script>

</body>
</html>
