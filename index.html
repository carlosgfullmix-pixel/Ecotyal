<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ecotyal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f4f7f6;
}

/* HERO */
.hero {
  position:relative;
  height:300px;
}

.hero img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero::after {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
}

.hero-content {
  position:absolute;
  bottom:20px;
  left:20px;
  right:20px;
  color:white;
}

.cta {
  margin-top:10px;
  display:block;
  padding:14px;
  background:#25D366;
  text-align:center;
  border-radius:10px;
  color:white;
  text-decoration:none;
}

/* FORM */
.container {
  padding:20px;
}

.form-box {
  background:white;
  padding:20px;
  border-radius:15px;
  margin-top:-30px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

select, textarea {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button {
  width:100%;
  margin-top:15px;
  padding:15px;
  background:#1F7A63;
  color:white;
  border:none;
  border-radius:12px;
  font-weight:600;
}

/* RESEÑAS */
.reviews {
  margin-top:30px;
}

.review {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

/* BOTÓN */
.floating {
  position:fixed;
  bottom:15px;
  left:15px;
  right:15px;
  background:#25D366;
  color:white;
  text-align:center;
  padding:15px;
  border-radius:15px;
  text-decoration:none;
}

</style>
</head>

<body>

<section class="hero">
  <img src="img/hero.png">
  <div class="hero-content">
    <h1>Pedí tu presupuesto en 1 minuto</h1>
    <p>Respuesta rápida y sin vueltas</p>
  </div>
</section>

<div class="container">

<div class="form-box">

<h3>¿Qué necesitás?</h3>

<select id="service">
<option value="">Seleccionar servicio</option>
<option>Construcción</option>
<option>Jardinería</option>
<option>Electricidad</option>
<option>Plomería</option>
<option>Reparaciones</option>
</select>

<h3>Urgencia</h3>

<select id="urgency">
<option>Normal</option>
<option>Urgente (hoy)</option>
<option>Emergencia</option>
</select>

<h3>Contanos el problema</h3>

<textarea id="details" placeholder="Ej: pérdida de agua, instalación eléctrica..."></textarea>

<button onclick="sendLead()">Solicitar presupuesto</button>

</div>

<div class="reviews">
  <h3>Clientes reales</h3>

  <div class="review">⭐⭐⭐⭐⭐ “Vinieron el mismo día, súper recomendados.”</div>
  <div class="review">⭐⭐⭐⭐⭐ “Precio claro y trabajo impecable.”</div>
  <div class="review">⭐⭐⭐⭐⭐ “Solucionaron todo en pocas horas.”</div>
</div>

</div>

<a class="floating" href="#" onclick="sendLead()">💬 Enviar por WhatsApp</a>

<script>

function sendLead() {
  let service = document.getElementById("service").value;
  let urgency = document.getElementById("urgency").value;
  let details = document.getElementById("details").value;

  let msg = "Hola, quiero un presupuesto%0A";

  if(service) msg += "Servicio: " + service + "%0A";
  if(urgency) msg += "Urgencia: " + urgency + "%0A";
  if(details) msg += "Detalle: " + details;

  let url = "https://wa.me/5492234376369?text=" + msg;
  window.open(url, "_blank");
}

</script>

</body>
</html>
