<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Multi-IA Simulada</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

textarea {
  width: 100%;
  height: 100px;
  margin-bottom: 10px;
}

button {
  padding: 10px 20px;
  background: #22c55e;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.box {
  margin-top: 15px;
  padding: 15px;
  border-radius: 10px;
}

.analista { background: #1e293b; }
.critico { background: #334155; }
.optimizador { background: #475569; }
</style>
</head>

<body>

<h2>🧠 Sistema Multi-IA (Simulado)</h2>

<textarea id="input" placeholder="Escribí un problema..."></textarea>
<br>
<button onclick="resolver()">Resolver con IAs</button>

<div id="resultado"></div>

<script>
function analista(texto) {
  return "🔍 Análisis: El problema trata sobre " + texto +
  ". Se identifican posibles causas y enfoques iniciales.";
}

function critico(texto) {
  return "⚠️ Crítica: El análisis es válido, pero falta profundidad. Se recomienda considerar riesgos y alternativas.";
}

function optimizador(a, b) {
  return "✅ Solución final: Combinando el análisis y la crítica, la mejor solución es estructurar una estrategia clara, evaluar riesgos y ejecutar con mejoras continuas.";
}

function resolver() {
  const input = document.getElementById("input").value;

  const paso1 = analista(input);
  const paso2 = critico(paso1);
  const paso3 = optimizador(paso1, paso2);

  document.getElementById("resultado").innerHTML = `
    <div class="box analista">${paso1}</div>
    <div class="box critico">${paso2}</div>
    <div class="box optimizador">${paso3}</div>
  `;
}
</script>

</body>
</html>
