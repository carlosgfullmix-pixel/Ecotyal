<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Laboratorio IA Avanzado</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e2e8f0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

textarea {
  width: 100%;
  height: 80px;
  border-radius: 10px;
  padding: 10px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #38bdf8, #22c55e);
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.box {
  margin-top: 15px;
  padding: 15px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

.log {
  font-size: 14px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 Laboratorio IA Autónomo</h1>

<textarea id="input" placeholder="Ej: Analizar la distribución de ceros de Riemann"></textarea>
<button onclick="run()">Ejecutar Investigación</button>

<div id="output"></div>

</div>

<script>

// ==========================
// MODELO EXPERIMENTAL
// ==========================

function zeta(sReal, sImag) {
  let sum = 0;
  let N = 500;

  for (let n = 1; n < N; n++) {
    let logn = Math.log(n);
    sum += Math.cos(sImag * logn) / Math.pow(n, sReal);
  }

  return sum;
}

// ==========================
// IA: GENERADOR
// ==========================

function generarHipotesis(iter) {
  let base = 0.5 + (Math.random() - 0.5) * 0.2;
  return base.toFixed(3);
}

// ==========================
// IA: EXPERIMENTADOR
// ==========================

function experimentar(linea) {
  let resultados = [];

  for (let t = 10; t < 40; t += 1.5) {
    let val = zeta(linea, t);
    resultados.push(Math.abs(val));
  }

  return resultados;
}

// ==========================
// IA: EVALUADOR
// ==========================

function evaluar(resultados) {
  let promedio = resultados.reduce((a,b)=>a+b,0)/resultados.length;
  return promedio;
}

// ==========================
// IA: APRENDIZAJE
// ==========================

function ajustarHipotesis(actual, score) {
  let ajuste = (Math.random() - 0.5) * 0.05;

  if (score < 0.2) ajuste *= 0.5;
  if (score > 0.5) ajuste *= 1.5;

  return (parseFloat(actual) + ajuste).toFixed(3);
}

// ==========================
// SISTEMA PRINCIPAL
// ==========================

function run() {

  let output = "";
  let hipotesis = generarHipotesis(0);

  for (let i = 1; i <= 5; i++) {

    let resultados = experimentar(hipotesis);
    let score = evaluar(resultados);

    output += `
      <div class="box">
        🔁 Iteración ${i}<br>
        💡 Hipótesis: Re(s) = ${hipotesis}<br>
        📊 Error promedio: ${score.toFixed(4)}<br>
        <div class="log">Resultados (muestra): ${resultados.slice(0,5).map(x=>x.toFixed(3))}</div>
      </div>
    `;

    hipotesis = ajustarHipotesis(hipotesis, score);
  }

  output += `
    <div class="box">
      🏁 Hipótesis final optimizada: Re(s) ≈ ${hipotesis}
    </div>
  `;

  document.getElementById("output").innerHTML = output;
}

</script>

</body>
</html>
